<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إلى ميمي 🤍</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  background: #0b0b0b;
  color: #f5f5f5;
  font-family: Georgia, serif;
  direction: rtl;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  max-width: 600px;
  padding: 30px;
  text-align: center;
}

button {
  background: none;
  border: 1px solid #d4af37;
  color: #d4af37;
  padding: 14px 30px;
  border-radius: 40px;
  font-size: 18px;
  cursor: pointer;
  margin-bottom: 30px;
}

button:hover {
  background: #d4af37;
  color: #000;
}

.card {
  border-left: 3px solid #d4af37;
  padding: 20px;
  margin-bottom: 25px;
  background: rgba(255,255,255,0.05);
  animation: slideUp 1.3s ease;
}

#player {
  display: none;
}

@keyframes slideUp {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">
  <button onclick="startMusic()">ابدأ الرحلة 🎶</button>

  <div class="card">
    وجودك بيننا مش بس لحظة صداقة وتنتهي 🤍
  </div>

  <div class="card">
    كل يوم وانتي معانا ينحفر بالذاكرة بكلامك الحلو  
    🫶 يارب سنة جديدة كلها فرح ونجاح وتحقق أحلامك
  </div>

  <div class="card">
    من المهندس محمد 👷‍♂️ إلى المهندسة مرام 💻  
    كل عام وأنتِ بخير 🎂
  </div>
</div>

https://www.youtube.com/embed/33NxhNZbAJM?enablejsapi=1</iframe>

<script>
function startMusic() {
  var iframe = document.getElementById("player");
  iframe.style.display = "block";
  iframe.contentWindow.postMessage(
    '{"event":"command","func":"playVideo","args":""}',
    "*"
  );
}
</script>

</body>
</html>
